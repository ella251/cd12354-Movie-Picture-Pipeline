name: Backend CI

on:
  push:
    paths:
      - 'starter/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'starter/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: starter/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run lint
        run: pipenv run lint

      - name: Run tests
        run: pipenv run test
