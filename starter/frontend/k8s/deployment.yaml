apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 054701322656.dkr.ecr.us-east-1.amazonaws.com/frontend:27449610370300ddb013079fb1391268273b7347
          ports:
            - containerPort: 3000
